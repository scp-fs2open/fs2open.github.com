<h1>Player Orders</h1>
<p>Accessed via the <strong>Player Orders</strong> button in the <a href="ShipEditorDialog.html">Ship Editor</a>.</p>
<p>Lists all orders the player can issue via the comm menu. Check an order to allow
the player to send it to this ship; uncheck to prevent it.</p>
