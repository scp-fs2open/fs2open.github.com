name: Bug Report
description: Report a bug in the OFP engine build. Feature requests belong in Discussions, not here.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **This tracker is for bugs only.** If something isn't broken (it's a feature request, a question, or a proposal) please open a [Discussion](../../discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we make this happen?
      placeholder: |
        1. Launch with mod X
        2. Load mission Y
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OFP build version, OS, and any relevant mod or configuration details.
      placeholder: |
        OFP version:
        OS:
        Mods active:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach fs2_open.log or relevant screenshots if applicable.
    validations:
      required: false
